[profile.default]
src = "contracts"
out = "out"
libs = ["node_modules", "lib"]
test = "test"
cache_path = "forge-cache"

solc = "0.8.24"
evm_version = "cancun"
via_ir = true
optimizer = true
optimizer_runs = 200

# Formatting
line_length = 120
tab_width = 4
bracket_spacing = false
int_types = "long"
multiline_func_header = "all"
quote_style = "double"
number_underscore = "thousands"

# Testing
ffi = false
verbosity = 2
gas_reports = ["*"]

[profile.ci]
verbosity = 4
fuzz = { runs = 1000 }

[fmt]
line_length = 120
